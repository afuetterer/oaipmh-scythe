# dependabot
# Ref: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# ------------------------------------------------------------------------------
version: 2
updates:
- package-ecosystem: github-actions
  directory: /
  open-pull-requests-limit: 1
  schedule:
    interval: quarterly
  commit-message:
    prefix: ci
  labels:
  - 'type: ci'
  - 'deps: github-actions'
  groups:
    github-actions:
      patterns:
      - '*'
  cooldown:
    default-days: 7
- package-ecosystem: pre-commit
  directory: /
  open-pull-requests-limit: 1
  schedule:
    interval: quarterly
  commit-message:
    prefix: build
  labels:
  - 'deps: pre-commit'
  groups:
    pre-commit:
      patterns:
      - '*'
  cooldown:
    default-days: 7
