# This CI job is adapted from:
# Scorecards' GitHub action (2013-09-12), Apache License 2.0
# Ref: https://github.com/ossf/scorecard-action/blob/8d9d91b01b9389de406141fb47b98726a399e1ea/README.md?plain=1#L198

name: Scorecard analysis
on:
  # Only the default branch is supported.
  branch_protection_rule:
  schedule:
    # run once a month at midnight of the first day of the month
  - cron: 0 0 1 * *
  push:
    branches: [main]

concurrency:
  group: scorecards-${{ github.ref }}
  cancel-in-progress: true

# Set permissions at the job level.
permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    permissions:
      contents: read          # Needed to checkout the repository code for scanning
      security-events: write  # Needed to upload the scorecard report to the Security tab
      id-token: write         # Needed to authenticate with the GitHub API for a full analysis
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    # Ref: https://github.com/ossf/scorecard-action
    - name: Run scorecard analysis
      uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
      with:
        results_file: results.sarif
        results_format: sarif
        # Ref: https://github.com/ossf/scorecard-action#publishing-results.
        publish_results: true

    # required for Code scanning alerts
    - name: Upload SARIF results to code scanning
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: results.sarif
