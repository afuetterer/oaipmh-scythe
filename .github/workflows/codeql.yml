# Ref: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/customizing-code-scanning
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Set permissions at the job level.
permissions: {}

concurrency:
  group: codeql-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Perform CodeQL Analysis
    runs-on: ubuntu-24.04
    permissions:
      actions: read           # Needed to read workflow metadata and logs
      contents: read          # Needed to checkout the repository code for scanning
      security-events: write  # Needed to upload the scan results to the Security tab
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
      # Ref: https://github.com/github/codeql-action
    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        languages: python
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
