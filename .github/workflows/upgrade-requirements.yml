name: Upgrade requirements

on:
  schedule:
    # run once a month at midnight of the first day of the month
  - cron: 0 0 1 * *
  workflow_dispatch: # run manually from actions tab

# Set permissions at the job level.
permissions: {}

jobs:
  upgrade:
    permissions:
      contents: write       # Needed to commit the updated lock file
      pull-requests: write  # Needed to open a pull request for review
    uses: afuetterer/.github/.github/workflows/_upgrade-requirements.yml@main # zizmor: ignore[unpinned-uses] this is my workflow
