# pre-commit
# Ref: https://pre-commit.com/#usage
# ------------------------------------------------------------------------------

# do not touch the cassette files: these are auto-generated by vcr.py
exclude: \/cassettes\/

default_language_version:
  python: '3.14'

repos:
  # Ref: https://pre-commit.com/#meta-hooks
- repo: meta
  hooks:
  - id: check-hooks-apply

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: check-case-conflict
  - id: check-ast
  - id: debug-statements
  - id: check-toml
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace
    args: [--markdown-linebreak-ext=md]
  - id: name-tests-test
    args: [--pytest-test-first]

- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-yaml
    args: [--autofix, --indent=2]

- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 5030dca3047414c338091455ac41803200ec1f0f  # frozen: 0.37.3
  hooks:
  - id: check-dependabot
  - id: check-github-workflows

- repo: https://github.com/tox-dev/pyproject-fmt
  rev: f073523dfd27b01ec7997cc970a2a7b36c303460  # frozen: v2.25.0
  hooks:
  - id: pyproject-fmt

- repo: https://github.com/rvben/rumdl-pre-commit
  rev: 0bc55c40f85efa6234cf801d82e8da5bc0ef0b7c  # frozen: v0.2.22
  hooks:
  - id: rumdl-fmt

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 745be0411e3c150e246d527e531e5a221b8c3462  # frozen: v0.15.19
  hooks:
  - id: ruff-check
    args: [--fix, --show-fixes, --exit-non-zero-on-fix]
  - id: ruff-format

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0
  hooks:
  - id: mypy
    args: [--config-file=pyproject.toml]
    additional_dependencies:
    - httpx==0.28.1
    - lxml-stubs==0.5.1
    exclude: tests

- repo: https://github.com/scientific-python/cookie
  rev: 8f0581cc50b14023b14a9c77e9b358738ba637e7  # frozen: 2026.06.18
  hooks:
  - id: sp-repo-review

- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
  hooks:
  - id: zizmor
    args:
    - --fix
    - --no-progress
    - --pedantic

- repo: https://github.com/crate-ci/typos
  rev: 37bb98842b0d8c4ffebdb75301a13db0267cef89  # frozen: v1.47.2
  hooks:
  - id: typos
    args: [--force-exclude]
    exclude: CHANGELOG.md # the commit hashes in changelog trigger the spell checker

- repo: https://github.com/FHPythonUtils/LicenseCheck/
  rev: 21abbebb654a297a8e7b62ddebe7a77504171386  # frozen: 2026.0.8
  hooks:
  - id: licensecheck

- repo: https://github.com/compilerla/conventional-pre-commit
  rev: 91ab4bf57e58b32adf1a122681f6ebe164d081c8  # frozen: v4.4.0-pre1
  hooks:
  - id: conventional-pre-commit
    stages: [commit-msg]
