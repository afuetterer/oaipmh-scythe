# pre-commit
# Ref: https://pre-commit.com/#usage
# ------------------------------------------------------------------------------

# Ref: https://pre-commit.ci/#configuration
ci:
  autofix_prs: false
  autoupdate_commit_msg: 'build: update pre-commit hooks'
  autoupdate_schedule: monthly
  skip: [licensecheck] # does not run on pre-commit.ci, due to sqlite error, runs locally

# do not touch the cassette files: these are auto-generated by vcr.py
exclude: \/cassettes\/

default_language_version:
  python: '3.14'

repos:
  # Ref: https://pre-commit.com/#meta-hooks
- repo: meta
  hooks:
  - id: check-hooks-apply

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: check-case-conflict
  - id: check-ast
  - id: debug-statements
  - id: check-toml
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace
    args: [--markdown-linebreak-ext=md]
  - id: name-tests-test
    args: [--pytest-test-first]

- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-yaml
    args: [--autofix, --indent, '2']

- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 13614ab716a3113145f1294ed259d9fbe5678ff3  # frozen: 0.37.1
  hooks:
  - id: check-dependabot
  - id: check-github-workflows

- repo: https://github.com/tox-dev/pyproject-fmt
  rev: 6e10264313f53d6247a8b1b984f5b5ccf50ba539  # frozen: v2.21.0
  hooks:
  - id: pyproject-fmt

- repo: https://github.com/hukkin/mdformat
  rev: 82912cdaea4fb830f751504486a7879c70526547  # frozen: 1.0.0
  hooks:
  - id: mdformat
    args: [--number, --wrap=120, --ignore-missing-references]
    exclude: CHANGELOG.md|.changelog.md|docs/src/api
    additional_dependencies:
    - mdformat-mkdocs[recommended]==v5.1.4

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: c60c980e561ed3e73101667fe8365c609d19a438  # frozen: v0.15.9
  hooks:
  - id: ruff-check
    args: [--fix, --show-fixes, --exit-non-zero-on-fix]
  - id: ruff-format

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: 8e5c80792e2ec0c87804d8ef915bf35e2caea6da  # frozen: v1.20.0
  hooks:
  - id: mypy
    args: [--config-file=pyproject.toml]
    additional_dependencies:
    - httpx==0.28.1
    - lxml-stubs==0.5.1
    exclude: tests

- repo: https://github.com/scientific-python/cookie
  rev: 04d0e44c1d3b036e9714aca375d965504ba5ea4a  # frozen: 2026.04.04
  hooks:
  - id: sp-repo-review

- repo: https://github.com/crate-ci/typos
  rev: 02ea592e44b3a53c302f697cddca7641cd051c3d  # frozen: v1.45.0
  hooks:
  - id: typos
    args: [--force-exclude]
    exclude: CHANGELOG.md # the commit hashes in changelog trigger the spell checker

- repo: https://github.com/FHPythonUtils/LicenseCheck/
  rev: 1396d3408d6c08cad89229fa30ef17a35e35d5c4  # frozen: 2025.1.0
  hooks:
  - id: licensecheck

- repo: https://github.com/compilerla/conventional-pre-commit
  rev: 91ab4bf57e58b32adf1a122681f6ebe164d081c8  # frozen: v4.4.0-pre1
  hooks:
  - id: conventional-pre-commit
    stages: [commit-msg]
