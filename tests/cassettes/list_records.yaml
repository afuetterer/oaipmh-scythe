        dir=\"auto\"&amp;gt;8. Conclusion&amp;lt;/span&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;\n&amp;lt;p&amp;gt;&amp;nbsp;&amp;lt;/p&amp;gt;\n&amp;lt;p&amp;gt;&amp;lt;span
        dir=\"auto\"&amp;gt;&amp;lt;span dir=\"auto\"&amp;gt;&amp;lt;span dir=\"auto\"&amp;gt;&amp;lt;span
        dir=\"auto\"&amp;gt;Un syst&amp;egrave;me scientifique peut &amp;ecirc;tre
        formellement juste, empiriquement valide et globalement destructeur, sans
        intention, erreur ou mensonge.&amp;lt;/span&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;\n&amp;lt;p&amp;gt;&amp;nbsp;&amp;lt;/p&amp;gt;\n&amp;lt;p&amp;gt;&amp;lt;span
        dir=\"auto\"&amp;gt;&amp;lt;span dir=\"auto\"&amp;gt;&amp;lt;span dir=\"auto\"&amp;gt;&amp;lt;span
        dir=\"auto\"&amp;gt;Si confirm&amp;eacute; exp&amp;eacute;rimentalement, ce
        constat impose une r&amp;eacute;&amp;eacute;valuation des crit&amp;egrave;res
        de validation : la v&amp;eacute;rit&amp;eacute; scientifique doit &amp;ecirc;tre
        &amp;eacute;cologique autant qu'empirique.&amp;lt;/span&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;\n&amp;lt;p&amp;gt;&amp;nbsp;&amp;lt;/p&amp;gt;\n&amp;lt;p&amp;gt;&amp;nbsp;&amp;lt;/p&amp;gt;\n&amp;lt;p&amp;gt;&amp;lt;span
