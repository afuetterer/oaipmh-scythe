        \     </header>\n      <metadata>\n        <oai_dc:dc xmlns:dc=\"http://purl.org/dc/elements/1.1/\"
        xmlns:oai_dc=\"http://www.openarchives.org/OAI/2.0/oai_dc/\" xsi:schemaLocation=\"http://www.openarchives.org/OAI/2.0/oai_dc/
        http://www.openarchives.org/OAI/2.0/oai_dc.xsd\">\n          <dc:creator>Autor1</dc:creator>\n
        \         <dc:date>2026-03-29</dc:date>\n          <dc:description>&amp;lt;p&amp;gt;The
        materials include: (i) scripts developed in Google Earth Engine for image
        processing and spectral index calculation; (ii) R scripts used for statistical
        analyses and correlation assessment; (iii) geospatial processing workflows
        implemented in QGIS; and (iv) tabular datasets containing time series of environmental
        and anthropogenic variables derived from Landsat imagery and land cover and
        land use products.&amp;lt;/p&amp;gt;\n&amp;lt;p&amp;gt;Due to technical and
        storage limitations, the original satellite imagery is not included in the
        repository; however, these data can be accessed directly through the respective
        platforms (e.g., Google Earth Engine). Additionally, access to certain processed
        datasets may be provided upon reasonable request, in accordance with ethical
        considerations and to ensure data integrity and prevent misuse or unintended
        disclosure.&amp;lt;/p&amp;gt;\n&amp;lt;p&amp;gt;Access to the repository is
        currently restricted and will be released in a public data repository later.
        The authors' names have been removed to avoid interfering with the review
        process.&amp;lt;/p&amp;gt;</dc:description>\n          <dc:identifier>https://doi.org/10.5281/zenodo.19302787</dc:identifier>\n
