        \         <dc:date>2023-10-12</dc:date>\n          <dc:description>&amp;lt;p&amp;gt;This
        code uses the gFlex code (Wickert, 2016) which solves the flexure equations
        in 3D, here from an analytical solution. The elastic thickness is therefore
        constant. Was implemented:&amp;lt;/p&amp;gt;\n\n&amp;lt;ul&amp;gt;\n\t&amp;lt;li&amp;gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;
        Reading a grid representing a spatially variable load&amp;lt;/li&amp;gt;\n\t&amp;lt;li&amp;gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;
        Viscous lithospheric relaxation (see Turcotte and Schubert)&amp;lt;/li&amp;gt;\n\t&amp;lt;li&amp;gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;
        Calculations of strain and stress tensors at any point&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;</dc:description>\n
        \         <dc:description>This code has been provided \"as is\", for reproducibility
        purposes (Solid Earth, \"Glacial-isostatic-adjustment strain rate\u2013stress
        paradox in the Western Alps and impact on active faults and seismicity\").
