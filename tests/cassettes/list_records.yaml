        \         <dc:date>2023-10-12</dc:date>\n          <dc:description>&amp;lt;p&amp;gt;This
        dataset contains the spatial transcriptome dataset&amp;nbsp;of human gastric
        mucosa obtained by CosMx&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;A zip file
        contains the following folders and files:&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Folders&amp;lt;/strong&amp;gt;&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;-&amp;nbsp;CellComposite
        folder: the composite immunofluorescent images of each FOV.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;-
        CellLabels folder: the cell definitions&amp;nbsp;images for each FOV determined
        during cell segmentation.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;- CellOverlay
        folder: the cell boundary images for each FOV&amp;nbsp;determined during cell
        segmentation.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;- CompartmentLabels folder:
        the subcellular compartment images for each FOV determined during cell segmentation.
        The compartment types are as follows:&amp;nbsp;0. Extracellular, 1. Nuclear,
        2. Membrane, 3. Cytoplasmic&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;- RawMorphologyImages
        folder: raw morphological TIF images&amp;nbsp;for each FOV&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;nbsp;&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Files&amp;lt;/strong&amp;gt;&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;-
        Run5458_{sample_name}_exprMat_file.csv:&amp;nbsp;cell expression matrix.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;-
        Run5458_{sample_name}_fov_positions_file.csv: each FOV relative position within
        global structure.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;- Run5458_{sample_name}_metadata_file.csv:
        the metadata of each cell.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;- Run5458_{sample_name}_tx_file.csv:
        the transcript file for each target gene and its position.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;-
        Run5458_{sample_name}-polygons.csv: the segmentation polygon file.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;nbsp;&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Citation&amp;lt;/strong&amp;gt;&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;If
        you use this dataset for your research, please cite our paper.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;Ayumu
        Tsubosaka, Daisuke Komura, Miwako Kakiuchi, Hiroto Katoh, Takumi Onoyama,
        Asami Yamamoto, Hiroyuki Abe, Yasuyuki Seto, Tetsuo Ushiku, Shumpei Ishikawa,&amp;nbsp;Stomach
        encyclopedia: Combined single-cell and spatial transcriptomics reveal cell
        diversity and homeostatic regulation of human stomach, Cell Reports, Volume
        42, Issue 10, 2023, 113236,&amp;nbsp;https://doi.org/10.1016/j.celrep.2023.113236.&amp;lt;/p&amp;gt;</dc:description>\n
