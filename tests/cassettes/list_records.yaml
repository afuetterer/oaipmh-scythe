        \             <creatorName nameType=\"Personal\">Matteo Marchegiani</creatorName>\n
        \             <familyName>Matteo Marchegiani</familyName>\n              <affiliation>ETH
        Zurich</affiliation>\n            </creator>\n          </creators>\n          <titles>\n
        \           <title>PocketCoffea: a configuration layer for CMS analyses with
        Coffea</title>\n          </titles>\n          <publisher>Zenodo</publisher>\n
        \         <publicationYear>2023</publicationYear>\n          <dates>\n            <date
        dateType=\"Issued\">2023-10-10</date>\n            <date dateType=\"Updated\">2023-10-12</date>\n
        \         </dates>\n          <resourceType resourceTypeGeneral=\"Text\">Presentation</resourceType>\n
        \         <identifier identifierType=\"DOI\">10.5281/zenodo.8435696</identifier>\n
        \         <relatedIdentifiers>\n            <relatedIdentifier relationType=\"IsVersionOf\"
        relatedIdentifierType=\"DOI\">10.5281/zenodo.8435695</relatedIdentifier>\n
        \         </relatedIdentifiers>\n          <rightsList>\n            <rights
        rightsURI=\"https://creativecommons.org/licenses/by/4.0/legalcode\" rightsIdentifierScheme=\"spdx\"
        rightsIdentifier=\"cc-by-4.0\">Creative Commons Attribution 4.0 International</rights>\n
        \           <rights rightsURI=\"info:eu-repo/semantics/openAccess\"/>\n          </rightsList>\n
        \         <descriptions>\n            <description descriptionType=\"Abstract\">A
        configuration layer for the analysis of CMS data in the NanoAOD format is
        presented. The framework is based on the columnar analysis of proton-proton
        collision events with the Coffea Python package and it focuses on configurability
        and reproducibility of analysis tasks.\n\n\nAll the operations needed to extract
        the relevant information from events are performed by a Coffea processor object
        that takes the NanoAOD events as input and returns a set of output histograms
        or arrays.\nPocketCoffea defines a configuration scheme to specify all the
        parameters and settings of the processor: the datasets definition, object
        and event selections, Monte Carlo weights, systematic uncertainties and the
        output histograms characteristics. The configuration layer is user friendly
        and speeds up the setup of many common analysis tasks.\nA structured processor
        performing operations that are common among CMS analyses is defined and can
        be customized with derived processor classes, allowing code sharing between
        different analyses workflows in a hierarchical structure.\nWith its configurable
        structure, PocketCoffea is a suitable tool to perform any CMS analysis in
        a highly reproducible, computational efficient and user-friendly way.</description>\n
