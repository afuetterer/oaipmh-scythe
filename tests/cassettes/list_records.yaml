        International (CC BY-NC-ND 4.0)&amp;lt;/p&amp;gt;\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Version&amp;lt;/strong&amp;gt;
        2 du 01/04/2026&amp;lt;/p&amp;gt;\n&amp;lt;h2&amp;gt;R&amp;eacute;sum&amp;eacute;&amp;lt;/h2&amp;gt;\n&amp;lt;p&amp;gt;Cette
