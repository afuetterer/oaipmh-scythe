        \       <oai_dc:dc xmlns:dc=\"http://purl.org/dc/elements/1.1/\" xmlns:oai_dc=\"http://www.openarchives.org/OAI/2.0/oai_dc/\"
        xsi:schemaLocation=\"http://www.openarchives.org/OAI/2.0/oai_dc/ http://www.openarchives.org/OAI/2.0/oai_dc.xsd\">\n
        \         <dc:creator>Dias, Marcos Antonio Negreiros</dc:creator>\n          <dc:creator>Tirello,
        Dernivaldo da Costa</dc:creator>\n          <dc:creator>Barbosa, Gerson</dc:creator>\n
        \         <dc:creator>Batista, Leon\xEDzia Santos</dc:creator>\n          <dc:creator>S\xE1,
        Rodrigo Almeida de</dc:creator>\n          <dc:creator>Feitosa, Adriana Alencar</dc:creator>\n
        \         <dc:creator>Almeida, Luciene Siqueira Freitas</dc:creator>\n          <dc:creator>Santos,
        Daniel Silva dos</dc:creator>\n          <dc:creator>J\xFAnior, An\xEDsio
        Vaz de Melo</dc:creator>\n          <dc:creator>Albernaz, Messias Rog\xE9rio
        Ara\xFAjo</dc:creator>\n          <dc:creator>Moura, Jaqueline de Ara\xFAjo</dc:creator>\n
        \         <dc:date>2026-03-31</dc:date>\n          <dc:description>A Educa\xE7\xE3o
        Ambiental tem papel central no enfrentamento da crise clim\xE1tica, sendo
        potencializada pelo uso de tecnologias educacionais. No entanto, a literatura
        predominante assume condi\xE7\xF5es ideais de conectividade e infraestrutura,
        desconsiderando a realidade de muitas escolas p\xFAblicas em contextos de
        vulnerabilidade socioambiental. Nesse cen\xE1rio, este estudo buscou analisar
        como estruturar a Educa\xE7\xE3o Ambiental mediada por tecnologias em contextos
        de baixa conectividade e como as desigualdades digitais afetam sua efetividade.
        Trata-se de uma revis\xE3o sistem\xE1tica da literatura, conduzida conforme
        o protocolo PRISMA, com buscas nas bases Scopus e Web of Science, resultando
        em um corpus final de 30 artigos. A an\xE1lise foi realizada por meio de an\xE1lise
        tem\xE1tica de conte\xFAdo, com base em Bardin. Os resultados indicam a predomin\xE2ncia
        de tecnologias online, associadas a melhores resultados em contextos com alta
        conectividade, enquanto cen\xE1rios vulner\xE1veis apresentam resultados inconsistentes.
        Estrat\xE9gias offline, h\xEDbridas e de baixo custo mostraram-se mais adequadas,
        por\xE9m ainda pouco exploradas. Al\xE9m disso, as desigualdades digitais
        impactam diretamente a participa\xE7\xE3o e a aprendizagem dos estudantes.
        Conclui-se que a efetividade das tecnologias educacionais depende de sua adequa\xE7\xE3o
        ao contexto, sendo necess\xE1rias abordagens mais inclusivas e contextualizadas.</dc:description>\n
        \         <dc:identifier>https://doi.org/10.70773/revistatopicos/774987118</dc:identifier>\n
        \         <dc:identifier>oai:zenodo.org:19360917</dc:identifier>\n          <dc:publisher>Revista
        T\xF3picos</dc:publisher>\n          <dc:rights>info:eu-repo/semantics/openAccess</dc:rights>\n
        \         <dc:source>Revista T\xF3picos, 4(31), (2026-03-31)</dc:source>\n
        \         <dc:subject>Equidade Educacional</dc:subject>\n          <dc:subject>Inova\xE7\xE3o
        Pedag\xF3gica</dc:subject>\n          <dc:subject>Ambientes de Aprendizagem</dc:subject>\n
        \         <dc:subject>Desenvolvimento Sustent\xE1vel</dc:subject>\n          <dc:title>CONTRIBUI\xC7\xD5ES
        DA EDUCA\xC7\xC3O AMBIENTAL MEDIADA POR TECNOLOGIAS EM CONTEXTOS DE DESIGUALDADE
        DIGITAL: ADEQUA\xC7\xC3O, EQUIDADE E EFETIVIDADE EM CEN\xC1RIOS DE BAIXA CONECTIVIDADE</dc:title>\n
