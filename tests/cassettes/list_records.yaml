        \ <request verb=\"ListRecords\" until=\"2026-04-02T00:00:00Z\" metadataPrefix=\"oai_dc\">https://zenodo.org/oai2d</request>\n
        \ <ListRecords>\n    <record>\n      <header>\n        <identifier>oai:zenodo.org:8435696</identifier>\n
        \       <datestamp>2023-10-12T14:26:07Z</datestamp>\n        <setSpec>user-pyhep2023</setSpec>\n
        \       <setSpec>openaire</setSpec>\n      </header>\n      <metadata>\n        <oai_dc:dc
        xmlns:dc=\"http://purl.org/dc/elements/1.1/\" xmlns:oai_dc=\"http://www.openarchives.org/OAI/2.0/oai_dc/\"
        xsi:schemaLocation=\"http://www.openarchives.org/OAI/2.0/oai_dc/ http://www.openarchives.org/OAI/2.0/oai_dc.xsd\">\n
        \         <dc:creator>Matteo Marchegiani</dc:creator>\n          <dc:date>2023-10-10</dc:date>\n
        \         <dc:description>&amp;lt;p&amp;gt;A configuration layer for the analysis
        of CMS data in the NanoAOD format is presented. The framework is based on
        the columnar analysis of proton-proton collision events with the Coffea Python
        package and it focuses on configurability and reproducibility of analysis
        tasks.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;All the operations needed to
        extract the relevant information from events are performed by a Coffea processor
        object that takes the NanoAOD events as input and returns a set of output
        histograms or arrays.&amp;lt;br&amp;gt;\nPocketCoffea defines a configuration
        scheme to specify all the parameters and settings of the processor: the datasets
        definition, object and event selections, Monte Carlo weights, systematic uncertainties
        and the output histograms characteristics. The configuration layer is user
        friendly and speeds up the setup of many common analysis tasks.&amp;lt;br&amp;gt;\nA
        structured processor performing operations that are common among CMS analyses
        is defined and can be customized with derived processor classes, allowing
        code sharing between different analyses workflows in a hierarchical structure.&amp;lt;br&amp;gt;\nWith
        its configurable structure, PocketCoffea is a suitable tool to perform any
        CMS analysis in a highly reproducible, computational efficient and user-friendly
        way.&amp;lt;/p&amp;gt;</dc:description>\n          <dc:identifier>https://doi.org/10.5281/zenodo.8435696</dc:identifier>\n
        \         <dc:identifier>oai:zenodo.org:8435696</dc:identifier>\n          <dc:publisher>Zenodo</dc:publisher>\n
        \         <dc:relation>https://zenodo.org/communities/pyhep2023/</dc:relation>\n
        \         <dc:relation>https://doi.org/10.5281/zenodo.8435695</dc:relation>\n
        \         <dc:rights>info:eu-repo/semantics/openAccess</dc:rights>\n          <dc:rights>Creative
        Commons Attribution 4.0 International</dc:rights>\n          <dc:rights>https://creativecommons.org/licenses/by/4.0/legalcode</dc:rights>\n
        \         <dc:source>PyHEP 2023 Workshop, 9-12 October 2023</dc:source>\n
        \         <dc:title>PocketCoffea: a configuration layer for CMS analyses with
        Coffea</dc:title>\n          <dc:type>info:eu-repo/semantics/lecture</dc:type>\n
        \       </oai_dc:dc>\n      </metadata>\n    </record>\n    <record>\n      <header>\n
